<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 23 февраля!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Звёзды */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        /* Конфетти */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -10px;
            animation: fall linear forwards;
            z-index: 100;
        }
        
        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(720deg);
            }
        }
        
        /* Основной контейнер */
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        /* Открытка */
        .card {
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 50px 40px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: cardAppear 1.5s ease-out;
        }
        
        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        /* Военная тематика - шеврон */
        .chevron {
            width: 80px;
            height: 40px;
            background: linear-gradient(135deg, #c9a227, #f4d03f);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            animation: shine 3s infinite;
        }
        
        @keyframes shine {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }
        
        /* Заголовок */
        .title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(32px, 8vw, 56px);
            color: #f4d03f;
            text-shadow: 0 0 30px rgba(244, 208, 63, 0.5);
            margin-bottom: 10px;
            animation: titleGlow 2s infinite alternate;
        }
        
        @keyframes titleGlow {
            from { text-shadow: 0 0 20px rgba(244, 208, 63, 0.3); }
            to { text-shadow: 0 0 40px rgba(244, 208, 63, 0.7); }
        }
        
        .subtitle {
            font-size: 18px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 30px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        /* Основной текст */
        .message {
            font-size: clamp(16px, 4vw, 20px);
            color: rgba(255,255,255,0.9);
            line-height: 1.8;
            margin-bottom: 30px;
        }
        
        .highlight {
            color: #e74c3c;
            font-weight: 600;
        }
        
        /* Пожелания */
        .wishes {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }
        
        .wish {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 20px;
            border-radius: 25px;
            color: white;
            font-size: 14px;
            animation: wishAppear 0.5s ease-out backwards;
        }
        
        .wish:nth-child(1) { animation-delay: 0.5s; }
        .wish:nth-child(2) { animation-delay: 0.7s; }
        .wish:nth-child(3) { animation-delay: 0.9s; }
        .wish:nth-child(4) { animation-delay: 1.1s; }
        
        @keyframes wishAppear {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Подпись */
        .signature {
            font-size: 16px;
            color: rgba(255,255,255,0.6);
            font-style: italic;
        }
        
        /* Эмблема */
        .emblem {
            width: 60px;
            height: 60px;
            margin: 30px auto 0;
            position: relative;
        }
        
        .emblem::before {
            content: '★';
            font-size: 60px;
            color: #c9a227;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-shadow: 0 0 20px rgba(201, 162, 39, 0.5);
            animation: starPulse 2s infinite;
        }
        
        @keyframes starPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }
        
        /* Кнопка */
        .btn {
            margin-top: 30px;
            padding: 15px 40px;
            background: linear-gradient(135deg, #c9a227, #f4d03f);
            border: none;
            border-radius: 30px;
            color: #1a1a2e;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(201, 162, 39, 0.4);
        }
        
        /* Адаптивность */
        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
            .wishes {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <!-- Фон со звёздами -->
    <div class="stars" id="stars"></div>
    
    <div class="container">
        <div class="card">
            <div class="chevron">⚔️</div>
            <h1 class="title">С 23 Февраля!</h1>
            <p class="subtitle">День защитника Отечества</p>
            
            <p class="message">
                Дорогой <span class="highlight">папа</span>!<br><br>
                В этот день хочу сказать тебе главное:<br>
                ты — настоящий защитник нашей семьи!<br>
                Не только Родины, но и каждого из нас.
            </p>
            
            <div class="wishes">
                <span class="wish">💪 Здоровья</span>
                <span class="wish">⚡ Силы</span>
                <span class="wish">🎯 Успеха</span>
                <span class="wish">❤️ Счастья</span>
            </div>
            
            <p class="signature">
                С любовью и уважением ❤️
            </p>
            
            <div class="emblem"></div>
            
            <button class="btn" onclick="createConfetti()">Праздник!</button>
        </div>
    </div>

    <script>
        // Создание звёзд на фоне
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 100;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 2 + 's';
                star.style.animationDuration = (Math.random() * 2 + 1) + 's';
                starsContainer.appendChild(star);
            }
        }
        
        // Создание конфетти
        function createConfetti() {
            const colors = ['#c9a227', '#f4d03f', '#e74c3c', '#3498db', '#2ecc71', '#9b59b6'];
            
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                    
                    if (Math.random() > 0.5) {
                        confetti.style.borderRadius = '50%';
                    }
                    
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 30);
            }
        }
        
        // Запуск
        createStars();
    </script>
</body>
</html>
