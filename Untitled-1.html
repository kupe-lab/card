<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поздравление!</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            font-family: Arial, sans-serif;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 90%;
        }
        h1 { color: #e91e63; }
        p { font-size: 18px; color: #333; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎉 С Днём Рождения! 🎉</h1>
        <p>Желаю счастья, здоровья и исполнения всех желаний!</p>
    </div>
</body>
</html>
